name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]" -c requirements.lock
      - run: ruff check .
      - run: mypy src
      - run: pytest
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.lock

  build-and-release:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_bytes().decode())["project"]["version"])')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $project_version" >&2
            exit 1
          fi
      - name: Extract release notes from CHANGELOG
        run: |
          python - "$GITHUB_REF_NAME" <<'PY' > "$RUNNER_TEMP/release-notes.md"
          import pathlib, re, sys

          version = sys.argv[1].lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text()
          match = re.search(
              rf"^## \[{re.escape(version)}\].*?$(.*?)(?=^## \[|^\[.*?\]: http)",
              text,
              re.M | re.S,
          )
          if not match:
              sys.exit(f"No CHANGELOG section for {version}")
          print(match.group(1).strip())
          PY
      - run: python -m pip install build
      - run: python -m build
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --notes-file "$RUNNER_TEMP/release-notes.md"
