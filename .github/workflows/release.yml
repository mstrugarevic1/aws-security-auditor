name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_bytes().decode())["project"]["version"])')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $project_version" >&2
            exit 1
          fi
      - run: python -m pip install build
      - run: python -m build
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
