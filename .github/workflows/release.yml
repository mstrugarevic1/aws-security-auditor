name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]" -c requirements.lock
      - run: ruff check .
      - run: mypy src
      - run: pytest
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.lock

  build-and-release:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(PYTHONPATH=src python -c 'import aws_security_auditor; print(aws_security_auditor.__version__)')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match __version__ $project_version" >&2
            exit 1
          fi
      - run: python -m pip install build
      - run: python -m build
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
